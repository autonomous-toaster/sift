repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace -- -Dwarnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-machete
        name: cargo machete
        entry: cargo machete
        language: system
        pass_filenames: false
        types: [rust]

      - id: rust-file-length
        name: Rust file length (<=500 lines)
        entry: >-
          bash -c '
          rc=0;
          for f in "$@"; do
            n=$(wc -l < "$f");
            if [ "$n" -gt 500 ]; then
              echo "$f: $n lines (limit 500)";
              rc=1;
            fi;
          done;
          exit $rc' --
        language: system
        types: [rust]
        pass_filenames: true
        exclude: ^(target/|.*\.pb\.rs$)

